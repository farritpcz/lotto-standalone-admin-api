# golangci-lint config — admin-api
# Rules from: C:/project/lotto-system/docs/coding_standards.md
# Policy: size/complexity = warn-equivalent (non-blocking), safety = error
# Run: golangci-lint run ./...

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    # Safety / correctness
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosimple
    - typecheck
    # Code quality
    - funlen           # function length
    - gocyclo          # cyclomatic complexity
    - lll              # line length
    - misspell
    - unconvert
    - unparam
    - goconst          # repeated strings
    - gocritic
    # Style
    - gofmt
    - goimports

linters-settings:
  funlen:
    lines: 120          # hard limit per coding_standards §1
    statements: 60
  gocyclo:
    min-complexity: 15
  lll:
    line-length: 140
  goconst:
    min-len: 4
    min-occurrences: 3
  gocritic:
    disabled-checks:
      - ifElseChain
      - singleCaseSwitch

issues:
  exclude-dirs:
    - vendor
    - migrations
  exclude-rules:
    # Migrations + test files allowed to be long
    - path: _test\.go
      linters: [funlen, gocyclo, lll, goconst]
    - path: migrations/
      linters: [funlen, lll]
    # Main wiring file allowed to be verbose
    - path: cmd/server/main\.go
      linters: [funlen]
  max-issues-per-linter: 50
  max-same-issues: 10
