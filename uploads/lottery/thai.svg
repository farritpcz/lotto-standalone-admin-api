<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#d4820a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="95" fill="url(#shine)"/>
  <!-- Border ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c6760a" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Thai flag stripes hint -->
  <rect x="55" y="60" width="90" height="8" rx="4" fill="#ED1C24" opacity="0.9"/>
  <rect x="55" y="72" width="90" height="12" rx="4" fill="#241D4F" opacity="0.9"/>
  <rect x="55" y="88" width="90" height="8" rx="4" fill="#ED1C24" opacity="0.9"/>
  <!-- Lottery ticket shape -->
  <rect x="45" y="105" width="110" height="55" rx="8" fill="rgba(255,255,255,0.95)"/>
  <rect x="45" y="105" width="110" height="55" rx="8" fill="none" stroke="#c6760a" stroke-width="1.5"/>
  <!-- Ticket details -->
  <text x="100" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#d4820a">THAI LOTTERY</text>
  <text x="100" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="800" fill="#1a3d35" letter-spacing="3">847 56</text>
  <!-- Star decorations -->
  <text x="52" y="118" font-size="10" fill="#d4820a">&#9733;</text>
  <text x="143" y="118" font-size="10" fill="#d4820a">&#9733;</text>
  <!-- Crown on top -->
  <text x="100" y="50" text-anchor="middle" font-size="28">&#128081;</text>
</svg>
